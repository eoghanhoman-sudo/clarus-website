                    <div style={{ padding: 14, background: "rgba(212, 148, 43, 0.08)", borderRadius: 14, marginBottom: 20 }}>
                        <p style={{ fontSize: 12, lineHeight: 1.5 }}>❤️ Whatever you're carrying, recognising it is the first step. You don't have to face it all at once.</p>
                    </div>

                    <button onClick={() => { setView("browse"); setCheckInIndex(0); setCheckInAnswers({}); }} className="btn-primary">Done</button>
                </div>
            );
        }

        const currentSign = allSelfSigns[checkInIndex];
        const progress = ((checkInIndex + 1) / allSelfSigns.length) * 100;

        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column" }}>
                <div style={{ marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                        <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{checkInIndex + 1} of {allSelfSigns.length}</span>
                        <span style={{ fontSize: 11, color: categoryNames[currentSign.cat].color }}>{categoryNames[currentSign.cat].emoji} {categoryNames[currentSign.cat].name}</span>
                    </div>
                    <div style={{ height: 4, background: "var(--border)", borderRadius: 2 }}>
                        <div style={{ height: "100%", background: categoryNames[currentSign.cat].color, borderRadius: 2, width: `${progress}%`, transition: "width 0.3s" }} />
                    </div>
                </div>

                <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                    <div style={{ textAlign: "center", marginBottom: 24 }}>
                        <span style={{ fontSize: 36 }}>{currentSign.icon}</span>
                    </div>
                    <p className="serif" style={{ fontSize: 18, textAlign: "center", lineHeight: 1.5, marginBottom: 30, maxWidth: 320, margin: "0 auto 30px" }}>{currentSign.selfCheck}</p>

                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {[{ key: "yes", label: "Yes, this resonates" }, { key: "sometimes", label: "Sometimes or partly" }, { key: "no", label: "Not really" }].map(opt => (
                            <button key={opt.key} onClick={() => {
                                setCheckInAnswers({ ...checkInAnswers, [currentSign.id]: opt.key });
                                setTimeout(() => setCheckInIndex(checkInIndex + 1), 300);
                            }} style={{
                                padding: 14, borderRadius: 12, fontSize: 13, fontWeight: 500, cursor: "pointer",
                                background: checkInAnswers[currentSign.id] === opt.key ? categoryNames[currentSign.cat].color : "var(--card)",
                                color: checkInAnswers[currentSign.id] === opt.key ? "white" : "var(--text)",
                                border: `1px solid ${checkInAnswers[currentSign.id] === opt.key ? categoryNames[currentSign.cat].color : "var(--border)"}`,
                                transition: "all 0.2s"
                            }}>{opt.label}</button>
                        ))}
                    </div>
                </div>

                <button onClick={() => { setView("browse"); setCheckInIndex(0); setCheckInAnswers({}); }} style={{
                    background: "none", border: "none", cursor: "pointer", fontSize: 12, color: "var(--text-muted)", marginTop: 16, textAlign: "center"
                }}>Exit check-in</button>
            </div>
        );
    }

    // CONVERSATION COACH VIEW
    if (view === "coach") {
        const step = coachSteps[coachStep];
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
                <BackButton onClick={() => { setView("browse"); setCoachStep(0); }} />
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                    <h1 className="serif" style={{ fontSize: 20 }}>Conversation Coach</h1>
                    <span style={{ fontSize: 12, color: "var(--text-muted)", paddingTop: 6 }}>{coachStep + 1}/5</span>
                </div>

                <h2 className="serif" style={{ fontSize: 17, color: "#8B7355", marginBottom: 10 }}>{step.title}</h2>
                <p style={{ fontSize: 13, color: "var(--text)", lineHeight: 1.6, marginBottom: 16 }}>{step.content}</p>

                {step.scripts && (
                    <div style={{ marginBottom: 16 }}>
                        <p style={{ fontSize: 11, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 8 }}>What to say</p>
                        {step.scripts.map((s, i) => (
                            <div key={i} style={{ padding: 12, background: "rgba(139, 115, 85, 0.06)", borderRadius: 10, marginBottom: 6 }}>
                                <p style={{ fontSize: 11, fontWeight: 600, color: "#8B7355", marginBottom: 4 }}>{s.label}</p>
                                <p style={{ fontSize: 12, lineHeight: 1.5, fontStyle: "italic" }}>{s.text}</p>
                            </div>
                        ))}
                    </div>
                )}

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                    <div>
                        <p style={{ fontSize: 11, fontWeight: 600, color: "#6B8E99", marginBottom: 6 }}>✓ Do</p>
                        {step.doList.map((d, i) => <p key={i} style={{ fontSize: 11, color: "var(--text-muted)", lineHeight: 1.5, marginBottom: 4 }}>• {d}</p>)}
                    </div>
                    <div>
                        <p style={{ fontSize: 11, fontWeight: 600, color: "#C47850", marginBottom: 6 }}>✗ Don't</p>
                        {step.dontList.map((d, i) => <p key={i} style={{ fontSize: 11, color: "var(--text-muted)", lineHeight: 1.5, marginBottom: 4 }}>• {d}</p>)}
                    </div>
                </div>

                <div style={{ display: "flex", gap: 8 }}>
                    {coachStep > 0 && <button onClick={() => setCoachStep(coachStep - 1)} className="btn-secondary" style={{ flex: 1 }}>Previous</button>}
                    {coachStep < 4 ? (
                        <button onClick={() => setCoachStep(coachStep + 1)} className="btn-primary" style={{ flex: 1 }}>Next</button>
                    ) : (
                        <button onClick={() => { setView("browse"); setCoachStep(0); }} className="btn-primary" style={{ flex: 1 }}>Done</button>
                    )}
                </div>
            </div>
        );
    }

    // BROWSE VIEW (main)
    const renderSignsList = (signsObj, showHelps) => Object.entries(signsObj).map(([cat, signs]) => {
        if (!categoryNames[cat]) return null;
        return (
            <div key={cat} style={{ marginBottom: 10 }}>
                <div onClick={() => setExpanded(expanded === cat ? null : cat)} style={{
                    display: "flex", alignItems: "center", gap: 10, padding: 12, borderRadius: 12,
                    background: "var(--card)", border: "1px solid var(--border)", cursor: "pointer"
                }}>
                    <span style={{ fontSize: 18 }}>{categoryNames[cat].emoji}</span>
                    <div style={{ flex: 1 }}>
                        <p style={{ fontSize: 13, fontWeight: 600 }}>{categoryNames[cat].name}</p>
                        <p style={{ fontSize: 11, color: "var(--text-muted)" }}>{signs.length} signs</p>
                    </div>
                    <span style={{ fontSize: 10, transform: expanded === cat ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
                </div>
                {expanded === cat && (
                    <div style={{ marginTop: 4 }}>
                        {signs.map(s => (
                            <div key={s.id} onClick={() => setExpandedSign(expandedSign === s.id ? null : s.id)} style={{
                                padding: 12, marginLeft: 8, marginBottom: 4, background: "var(--card)",
                                border: "1px solid var(--border)", borderRadius: 10, cursor: "pointer"
                            }}>
                                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                                    <span style={{ fontSize: 16, flexShrink: 0 }}>{s.icon}</span>
                                    <div style={{ flex: 1 }}>
                                        <p style={{ fontSize: 12, fontWeight: 600, marginBottom: 2 }}>{s.title}</p>
                                        <p style={{ fontSize: 11, color: "var(--text-muted)", lineHeight: 1.4 }}>{s.desc}</p>
                                    </div>
                                </div>
                                {expandedSign === s.id && (
                                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--border)" }}>
                                        {showHelps && s.selfCheck && <p style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 6 }}><strong>Self-check:</strong> {s.selfCheck}</p>}
                                        {s.helps && <p style={{ fontSize: 11, color: categoryNames[cat].color, lineHeight: 1.4 }}><strong>What helps:</strong> {s.helps}</p>}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    });

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <BackButton onClick={() => navigate("home")} />
            <h1 className="serif" style={{ fontSize: 22, marginBottom: 4 }}>Recognise the Signs</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>Understanding what to look for.</p>

            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                <button onClick={() => setTab("self")} style={{
                    flex: 1, padding: 10, borderRadius: 10,
                    background: tab === "self" ? "var(--accent)" : "var(--card)",
                    color: tab === "self" ? "white" : "var(--text)",
                    border: `1px solid ${tab === "self" ? "var(--accent)" : "var(--border)"}`,
                    fontWeight: 500, cursor: "pointer", fontSize: 13
                }}>In Yourself</button>
                <button onClick={() => setTab("others")} style={{
                    flex: 1, padding: 10, borderRadius: 10,
                    background: tab === "others" ? "var(--accent)" : "var(--card)",
                    color: tab === "others" ? "white" : "var(--text)",
                    border: `1px solid ${tab === "others" ? "var(--accent)" : "var(--border)"}`,
                    fontWeight: 500, cursor: "pointer", fontSize: 13
                }}>In Others</button>
            </div>

            {tab === "self" && (
                <div>
                    <div onClick={() => setView("checkin")} className="card" style={{ marginBottom: 16, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(212, 148, 43, 0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>🔍</div>
                        <div>
                            <p style={{ fontSize: 13, fontWeight: 600 }}>Guided Check-in</p>
                            <p style={{ fontSize: 11, color: "var(--text-muted)" }}>Walk through 25 signs — takes 3-5 minutes</p>
                        </div>
                    </div>
                    {renderSignsList(selfSigns, true)}
                </div>
            )}

            {tab === "others" && (
                <div>
                    <div onClick={() => setView("coach")} className="card" style={{ marginBottom: 16, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(139, 115, 85, 0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>💬</div>
                        <div>
                            <p style={{ fontSize: 13, fontWeight: 600 }}>Conversation Coach</p>
                            <p style={{ fontSize: 11, color: "var(--text-muted)" }}>How to talk to someone you're worried about</p>
                        </div>
                    </div>
                    {renderSignsList(othersSigns, false)}
                </div>
            )}
        </div>
    );
}

function GroundingScreen({ navigate }) {
    const [phase, setPhase] = useState("intro");
    const [senseIndex, setSenseIndex] = useState(0);
    const [acknowledged, setAcknowledged] = useState(0);
    const [showQuietNote, setShowQuietNote] = useState(false);
    const quietTimerRef = useRef(null);

    const senses = [
        { name: "See", verb: "see", emoji: "👀", color: "#6BA894", count: 5, prompt: "Look around slowly", hint: "Whatever your eyes land on — no right answer", nudges: ["a colour", "a shape", "something still", "something moving", "a shadow or light"], quietNote: null },
        { name: "Touch", verb: "feel", emoji: "👋", color: "#8778B0", count: 4, prompt: "Notice what you can feel", hint: "On your skin, under your hands, beneath your feet", nudges: ["a temperature", "a texture", "something solid", "something soft"], quietNote: null },
        { name: "Hear", verb: "hear", emoji: "👂", color: "#5C94AD", count: 3, prompt: "Be still and listen", hint: "Close, far away, or just the quiet itself", nudges: ["something close", "something far", "your own breathing"], quietNote: null },
        { name: "Smell", verb: "smell", emoji: "👃", color: "#D4942B", count: 2, prompt: "Breathe in slowly", hint: "This one's often subtle — and that's fine", nudges: ["the air itself", "your clothes or skin"], quietNote: "Not much there? That's normal. Even 'nothing' is you paying attention." },
        { name: "Taste", verb: "taste", emoji: "👅", color: "#B8858F", count: 1, prompt: "Notice your mouth", hint: "Don't search — just notice what's already there", nudges: ["whatever's on your tongue"], quietNote: "Can't find anything? Notice the inside of your cheeks, your breath. That counts." }
    ];

    const current = senses[senseIndex];
    const nudge = current ? current.nudges[Math.min(acknowledged, current.nudges.length - 1)] : "";
    const isComplete = acknowledged >= (current ? current.count : 0);

    useEffect(() => {
        if (phase === "sensing" && current.quietNote && !isComplete) {
            setShowQuietNote(false);
            quietTimerRef.current = setTimeout(() => setShowQuietNote(true), 6000);
        }
        return () => { if (quietTimerRef.current) clearTimeout(quietTimerRef.current); };
    }, [phase, senseIndex]);

    const handleTap = () => {
        if (isComplete) return;
        setAcknowledged(acknowledged + 1);
    };

    const nextSense = () => {
        if (senseIndex < 4) {
            setPhase("breathing");
            setShowQuietNote(false);
            setTimeout(() => {
                setSenseIndex(senseIndex + 1);
                setAcknowledged(0);
                setPhase("sensing");
            }, 3500);
        } else {
            setPhase("complete");
        }
    };

    const skipSense = () => {
        setAcknowledged(current.count);
    };

    // SVG progress ring
    const ringSize = 140;
    const strokeWidth = 6;
    const radius = (ringSize - strokeWidth) / 2;
    const circumference = 2 * Math.PI * radius;
    const progressOffset = circumference - (acknowledged / (current ? current.count : 1)) * circumference;

    if (phase === "intro") {
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
                <p style={{ fontSize: 32, marginBottom: 16 }}>5 · 4 · 3 · 2 · 1</p>
                <h1 className="serif" style={{ fontSize: 24, marginBottom: 8 }}>Grounding</h1>
                <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 8, maxWidth: 280, lineHeight: 1.5 }}>When your mind is racing, this brings you back to right now — gently, using your five senses.</p>
                <p style={{ fontSize: 12, color: "var(--text-dim)", marginBottom: 30, maxWidth: 260 }}>No typing. Just noticing. There are no wrong answers.</p>
                <button onClick={() => setPhase("sensing")} className="btn-primary" style={{ width: 200 }}>Begin</button>
                <button onClick={() => navigate("home")} className="btn-secondary" style={{ width: 200, marginTop: 12 }}>Back</button>
            </div>
        );
    }

    if (phase === "breathing") {
        const nextSenseData = senses[Math.min(senseIndex + 1, 4)];
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
                <div style={{
                    width: 100, height: 100, borderRadius: "50%",
                    background: `${nextSenseData.color}25`,
                    boxShadow: `0 0 40px ${nextSenseData.color}20`,
                    marginBottom: 30,
                    animation: "breathe 3.5s ease-in-out infinite"
                }} />
                <p className="serif" style={{ fontSize: 18, marginBottom: 6 }}>Take a breath</p>
                <p style={{ fontSize: 13, color: "var(--text-muted)" }}>Then notice what you can {nextSenseData.verb}</p>
            </div>
        );
    }

    if (phase === "sensing") {
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{current.emoji} {current.prompt}</span>
                    <span style={{ fontSize: 11, color: current.color }}>{senseIndex + 1} of 5</span>
                </div>
                <p style={{ fontSize: 12, color: "var(--text-dim)", marginBottom: 20 }}>{current.hint}</p>

                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                    <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>Tap when you notice {nudge}</p>

                    <div onClick={handleTap} style={{ position: "relative", width: ringSize, height: ringSize, cursor: isComplete ? "default" : "pointer", marginBottom: 20 }}>
                        <svg width={ringSize} height={ringSize} style={{ transform: "rotate(-90deg)" }}>
                            <circle cx={ringSize/2} cy={ringSize/2} r={radius} fill="none" stroke={`${current.color}20`} strokeWidth={strokeWidth} />
                            <circle cx={ringSize/2} cy={ringSize/2} r={radius} fill="none" stroke={current.color} strokeWidth={strokeWidth}
                                strokeDasharray={circumference} strokeDashoffset={progressOffset}
                                strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)" }} />
                        </svg>
                        <div style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                            {isComplete ? (
                                <span style={{ fontSize: 28, color: current.color }}>✓</span>
                            ) : (
                                <>
                                    <p style={{ fontSize: 14, fontWeight: 500, color: current.color, textAlign: "center", maxWidth: 90, lineHeight: 1.3 }}>{nudge}</p>
                                    <p style={{ fontSize: 11, color: `${current.color}66`, marginTop: 4 }}>{acknowledged} of {current.count}</p>
                                </>
                            )}
                        </div>
                    </div>

                    {showQuietNote && current.quietNote && !isComplete && (
                        <div onClick={skipSense} style={{
                            padding: "10px 16px", background: `${current.color}10`, borderRadius: 12,
                            cursor: "pointer", marginBottom: 16, maxWidth: 280, textAlign: "center"
                        }}>
                            <p style={{ fontSize: 12, color: current.color, lineHeight: 1.4 }}>{current.quietNote}</p>
                        </div>
                    )}

                    {isComplete && (
                        <button onClick={nextSense} className="btn-primary" style={{ width: 200, background: current.color }}>
                            {senseIndex < 4 ? "Continue" : "Finish"}
                        </button>
                    )}
                </div>
            </div>
        );
    }

    if (phase === "complete") {
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
                <span style={{ fontSize: 56, marginBottom: 16 }}>✓</span>
                <h1 className="serif" style={{ fontSize: 32, marginBottom: 12 }}>You're here</h1>
                <p style={{ fontSize: 14, color: "var(--text-muted)", marginBottom: 12, maxWidth: 280, lineHeight: 1.6 }}>You brought yourself back to this moment. That takes real strength.</p>
                <p style={{ fontSize: 13, color: "var(--accent)", marginBottom: 30, maxWidth: 260, lineHeight: 1.5 }}>It doesn't matter what you noticed. What matters is that you stopped and paid attention.</p>
                <button onClick={() => navigate("home")} className="btn-primary" style={{ width: 200 }}>Done</button>
            </div>
        );
    }
}

function ArticlesScreen({ navigate }) {
    const [filter, setFilter] = useState("all");
    const [selectedArticle, setSelectedArticle] = useState(null);

    const categories = ["Anxiety", "Low Mood", "Stress", "Loneliness", "Grief", "Sleep", "Relationships", "Anger", "Alcohol", "Work", "Money"];

    const articles = {
        Anxiety: [
            { id: 1, title: "Understanding your racing mind", body: "Anxiety creates a loop where your brain becomes hyper-focused on potential threats. When you're in this state, your threat detection system (amygdala) is working overtime while your rational brain (prefrontal cortex) is offline. This isn't weakness — it's neurobiology. The racing thoughts, catastrophic predictions, and physical symptoms you experience are real. Your nervous system truly believes there's danger. The key is learning to signal safety back to your body through grounding, breathing, and small acts of courage. Each time you do something despite anxiety, you're rewiring your brain's threat assessment." },
            { id: 2, title: "When avoidance feeds anxiety", body: "Every time you avoid something because of anxiety, your brain logs it as 'that was dangerous and I survived by escaping.' The relief is immediate and powerful — which is why avoidance is so seductive. But over time, your world gradually shrinks. The list of things you avoid grows. And the anxiety doesn't decrease — it actually increases because your brain has learned that avoidance = safety. Breaking this cycle means approaching avoided situations gradually, starting with what feels only slightly uncomfortable. You're not pushing yourself to be 'tough.' You're retraining your nervous system." }
        ],
        "Low Mood": [
            { id: 3, title: "Depression isn't sadness", body: "Depression is a flattening — of energy, interest, motivation, and hope. You might not feel sad at all. You might feel numb. This numbness is your mind protecting itself from overwhelming pain, but it also cuts you off from connection and meaning. The good news: depression is highly treatable. 60-80% of people respond to first-line interventions like therapy and lifestyle changes. When depression is telling you that nothing will change, remember: that's a symptom, not the truth. Your brain in a depressed state generates thoughts that feel like facts but are actually cognitive distortions. The hopelessness is temporary, even when it feels permanent." },
            { id: 4, title: "Activity over motivation", body: "Depression hijacks motivation. You're waiting to feel like doing things before you do them. But that's backwards. When you're depressed, feelings follow action, not the other way around. This is called behavioural activation. You schedule activities you used to value — regardless of whether you feel like doing them — and rate your mood before and after. Almost always, people are surprised: the mood lifts a little after the activity. It's not about forcing yourself to be happy. It's about creating evidence that things still matter, even when your brain says they don't." }
        ],
        Stress: [
            { id: 5, title: "Chronic stress rewires your brain", body: "When you're under prolonged stress, your body keeps pumping out cortisol (the stress hormone). This changes your brain's structure and function. Your prefrontal cortex (decision-making, planning) shrinks. Your amygdala (threat detection) enlarges. You become more reactive, less able to think clearly, more prone to anxiety and low mood. Your immune system suffers. Your sleep becomes fragmented. This isn't just 'feeling stressed' — stress is physically reshaping your brain and body. The pathway back involves interrupting the stress cycle: sleep, movement, breathing, connection, and meaning. Small consistent actions compound." },
            { id: 6, title: "The Sunday dread spiral", body: "Sunday evening anxiety is real and it's worth paying attention to. As the week looms, your threat system activates. You're not weak for feeling it — you're responding reasonably to a situation that feels unmanageable. The pathway forward isn't pushing through. It's examining what specifically about the coming week feels overwhelming, breaking it into manageable pieces, identifying one thing you can control, and taking one small step. Also: if Sunday dread is a regular feature of your week, that's important information. Your work or life structure might need changing, not just your mindset." }
        ],
        Loneliness: [
            { id: 7, title: "Loneliness is a signal", body: "Loneliness isn't a character flaw. It's a signal that you need connection. But loneliness can create a trap: the more isolated you feel, the harder it becomes to reach out. Social anxiety kicks in. You assume you're a burden. You withdraw further. The spiral deepens. Breaking this cycle starts small: one message, one call, one moment of genuine connection. You don't need a large friend group. Research shows that even one meaningful relationship buffers against loneliness. And connection begets connection — vulnerability invites vulnerability." },
            { id: 8, title: "The difference between alone and lonely", body: "You can be surrounded by people and still feel desperately lonely. Loneliness isn't about proximity — it's about feeling understood and accepted. Solitude, by contrast, can be deeply nourishing. The difference is agency. Chosen time alone restores you. Unwanted isolation depletes you. If you're feeling lonely in a crowd, that's often a signal that the connection isn't genuine or mutual. You might need to seek out people who get you — online communities, groups centred on your interests, therapy, where people are gathered for real conversation rather than superficial socialising." }
        ],
        Grief: [
            { id: 9, title: "Grief has no timeline", body: "There's no 'getting over' grief. There's integrating it. Grief is love with nowhere to go, and it doesn't follow stages. It's not linear. You can have a good day and then be undone by a song or a date or a moment that reminds you. This is normal. This is how you know that person or that life mattered. Over time, the acute pain softens. The grief becomes part of your story rather than the whole story. You're not 'moving on' — you're moving forward while carrying what was." },
            { id: 10, title: "Grief in a culture that minimises pain", body: "Irish culture has both deep rituals around death and a tendency to 'get on with it.' Grief can feel isolating when people around you seem to have moved on. Your pain might be read as weakness or inability to cope. It's not. It's the depth of your love made visible. You might need to find spaces where your grief is witnessed and honoured — whether that's a grief counselor, a support group, or people who know how to sit with pain without trying to fix it. Your grief is valid. Take the time you need." }
        ],
        Sleep: [
            { id: 11, title: "Why your mind races at bedtime", body: "You lie down and suddenly your mind is full of worries, plans, replays of the day. This is partly because your threat system is more active when your body is still. It's also because daytime stress activates your nervous system, leaving you revved when you try to sleep. The pathway to better sleep isn't forcing yourself to relax — that creates tension. It's: protecting sleep time ruthlessly, limiting screens an hour before bed, gentle movement or stretching, breathing exercises, and giving your mind somewhere to go (journaling your worries before bed, having a 'worry window' during the day instead of at night)." },
            { id: 12, title: "The sleep and mood connection", body: "Sleep deprivation is one of the most powerful generators of low mood, anxiety, and rumination. When you're sleep-deprived, your emotional regulation tank is empty. Things that feel manageable on good sleep feel catastrophic when you're tired. Your threat system is more active. Your reward system is more muted. Improving sleep might be the single most impactful intervention for your mental health. One good night won't fix everything, but a consistent practice of sleep protection — same bedtime, no screens, cool dark room, wind-down routine — can shift your baseline mood and resilience significantly." }
        ],
        Relationships: [
            { id: 13, title: "Loneliness in love", body: "You can be in a relationship and feel deeply lonely. This happens when there's physical proximity but emotional distance. When you're not known. When you're performing rather than being. This kind of loneliness is uniquely painful because the person is right there but unreachable. If this is your experience, there's usually repair possible — but it requires vulnerability. One of you needs to say 'I feel lonely in this relationship' and mean it. That creates the possibility of reconnection." },
            { id: 14, title: "Communication after conflict", body: "The hours after an argument are crucial. Your threat system is activated. Your ability to hear is compromised. Rather than trying to resolve things immediately, it often works better to: cool down with separate time, come back when calmer, start with something true (not an accusation), listen without defending, and name what you're both feeling. A repair conversation isn't about winning. It's about understanding and reconnecting. 'I felt hurt when...' and 'I didn't realise you felt that way' can heal what seems irreparable." }
        ],
        Anger: [
            { id: 15, title: "Understanding reactive anger", body: "You snap at someone over something small and immediately regret it. This is reactive anger — your threat system firing without you having time to think. It's not a character flaw. It's often a sign that your emotional reserves are depleted, something triggered an old wound, or your nervous system is already activated. Understanding what's beneath the anger — the hurt, fear, or unmet need — helps you respond differently next time. The Anger Iceberg technique helps: the anger is the tip, but beneath it is usually sadness, fear, or feeling unseen." },
            { id: 16, title: "Anger as a boundary signal", body: "Anger often appears when a boundary has been crossed repeatedly. Your nervous system is saying 'this is too much.' Rather than suppressing the anger, it's worth listening to it. What boundary is being crossed? Can you name it clearly? Can you communicate it before you hit the limit? Anger expressed clearly and early is far less damaging than rage that erupts after months of violation. 'This doesn't work for me and I need to change it' is often what anger is trying to say." }
        ],
        Alcohol: [
            { id: 17, title: "Irish drinking culture and the 'fear'", body: "In Ireland, drinking is woven into nearly every social context. The normalization of heavy drinking makes it hard to spot when it's shifted from social enjoyment to emotional coping. Add the cultural acceptance of 'the fear' (next-day anxiety and shame) as a punch line, and people struggle to take their own drinking seriously. But if you're regularly experiencing anxiety hangovers, if you're hiding how much you drink, if drinking is creating consequences — that's worth paying attention to. You're not weak. You're noticing a pattern that needs addressing." },
            { id: 18, title: "Drinking to cope versus social drinking", body: "The key difference is function. Are you drinking to feel okay, or to celebrate and connect? If you're reaching for a drink when you're stressed, anxious, bored, or lonely — that's coping. The relief is immediate and that's the trap: it works so well that your brain learns to reach for it automatically. But alcohol is a depressant. It increases anxiety and low mood 12-24 hours later. You're essentially stealing tomorrow's peace to ease today's discomfort. Breaking the cycle means finding other ways to soothe, regulate, and celebrate." }
        ],
        Work: [
            { id: 19, title: "Burnout isn't laziness", body: "You're exhausted, cynical, and your performance is declining. You're not weak. Your nervous system is overloaded and your recovery systems can't keep up. This is burnout — and it's usually a signal that something about your work situation is unsustainable. You might need to: set firmer boundaries between work and rest, reduce your workload, change your role, or actually change jobs. Sometimes the intervention is personal (better sleep, exercise, therapy). Sometimes it's structural (the job genuinely needs to change). Usually it's both." },
            { id: 20, title: "The Sunday night spiral", body: "As the work week approaches, anxiety kicks in. You're dreading Monday. Your body is already tense. This is your nervous system responding reasonably to work that feels unmanageable or unsafe. Rather than pushing through, ask: what specifically about work is overwhelming? Is it the volume, the relationships, the lack of autonomy, the mismatch between your values and the work? Once you know what's actually wrong, you can address it — whether through conversations with your manager, changes to your schedule, or bigger decisions about whether this role or workplace is right for you." }
        ],
        Money: [
            { id: 21, title: "Money anxiety versus money problems", body: "Money anxiety is the feeling even when your financial situation is stable. Money problems are actual financial difficulty. Both are real and both can be addressed. If you're anxious about money, that's often rooted in deeper fears: safety, shame, control, or identity. The pathway forward involves both: getting clear on your actual financial situation (knowledge reduces catastrophic thinking) and addressing the underlying fear. If you have actual financial difficulty, organisations like MABS offer free, confidential money advice." },
            { id: 22, title: "Cost of living and mental health", body: "Ireland is experiencing a cost-of-living crisis and that's generating real stress. Rent, energy, childcare, food — everything costs more. This isn't 'poor budgeting.' This is structural. Your mental health is affected. Anxiety, low mood, relationship stress, and a sense of being trapped increase when financial pressure is real. You're not imagining the stress. Supporting yourself involves: getting practical help with budgeting or grants, connecting with others facing the same challenge (you're not alone), and advocating for structural change. Individual coping skills matter, but so does recognizing when the problem isn't personal." }
        ]
    };

    if (selectedArticle) {
        const cat = Object.keys(articles).find(c => articles[c].find(a => a.id === selectedArticle));
        const article = articles[cat].find(a => a.id === selectedArticle);
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column" }}>
                <BackButton onClick={() => setSelectedArticle(null)} />
                <h1 className="serif" style={{ fontSize: 20, marginBottom: 4 }}>{article.title}</h1>
                <p style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 16 }}>{cat}</p>
                <p style={{ fontSize: 13, lineHeight: 1.8, color: "var(--text)" }}>{article.body}</p>
            </div>
        );
    }

    const filtered = filter === "all" ? articles : { [filter]: articles[filter] };

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <BackButton onClick={() => navigate("home")} />
            <h1 className="serif" style={{ fontSize: 22, marginBottom: 4 }}>Articles</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>Read and learn.</p>

            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
                {["all", ...categories].map(cat => (
                    <button key={cat} onClick={() => setFilter(cat)} style={{
                        padding: "8px 12px", borderRadius: 20, fontSize: 12,
                        background: filter === cat ? "var(--accent)" : "var(--card)",
                        color: filter === cat ? "white" : "var(--text)",
                        border: `1px solid ${filter === cat ? "var(--accent)" : "var(--border)"}`,
                        cursor: "pointer", fontWeight: 500
                    }}>
                        {cat}
                    </button>
                ))}
            </div>

            {Object.entries(filtered).map(([cat, arts]) => (
                <div key={cat}>
                    {filter !== "all" && <h2 className="serif" style={{ fontSize: 16, marginBottom: 12 }}>{cat}</h2>}
                    {arts.map(a => (
                        <div key={a.id} onClick={() => setSelectedArticle(a.id)} className="card" style={{ marginBottom: 10, cursor: "pointer" }}>
                            <p style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{a.title}</p>
                            <p style={{ fontSize: 11, color: "var(--text-muted)", lineHeight: 1.4 }}>{a.body.substring(0, 100)}...</p>
                        </div>
                    ))}
                </div>
            ))}
        </div>
    );
}

function AssessmentScreen({ navigate }) {
    const [results, setResults] = useState(null);
    const [answers, setAnswers] = useState({});

    const questions = [
        { id: "e1", domain: "Emotional", text: "I can name and express my feelings clearly" },
        { id: "e2", domain: "Emotional", text: "I feel hopeful about the future" },
        { id: "e3", domain: "Emotional", text: "I'm managing stress well" },
        { id: "en1", domain: "Energy", text: "I have energy for activities I care about" },
        { id: "en2", domain: "Energy", text: "I sleep well and wake refreshed" },
        { id: "c1", domain: "Connection", text: "I feel connected to people who matter to me" },
        { id: "c2", domain: "Connection", text: "I have someone I can talk to about difficulties" },
        { id: "t1", domain: "Thinking", text: "My thinking is clear and I can focus" },
        { id: "t2", domain: "Thinking", text: "I'm not trapped in worry loops" },
        { id: "t3", domain: "Thinking", text: "I can see things in perspective" },
        { id: "co1", domain: "Coping", text: "I have healthy ways to manage stress" },
        { id: "co2", domain: "Coping", text: "I take care of my physical health" },
        { id: "p1", domain: "Purpose", text: "My life feels meaningful" },
        { id: "p2", domain: "Purpose", text: "I'm working toward things that matter to me" }
    ];

    const submit = () => {
        const total = Object.values(answers).reduce((a, b) => a + b, 0);
        const domains = {};
        questions.forEach(q => {
            if (!domains[q.domain]) domains[q.domain] = { total: 0, count: 0 };
            domains[q.domain].total += answers[q.id] || 0;
            domains[q.domain].count += 1;
        });
        setResults({ total, domains });
    };

    if (results) {
        const percentage = (results.total / 70) * 100;
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
                <BackButton onClick={() => { setResults(null); setAnswers({}); }} />
                <h1 className="serif" style={{ fontSize: 22, marginBottom: 4 }}>Your Results</h1>

                <div style={{ textAlign: "center", marginBottom: 24, padding: 20, background: "var(--card)", borderRadius: 16 }}>
                    <div style={{ width: 120, height: 120, margin: "0 auto 16px", borderRadius: "50%", background: `conic-gradient(var(--accent) 0deg ${percentage * 3.6}deg, var(--border) ${percentage * 3.6}deg)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ width: 100, height: 100, borderRadius: "50%", background: "var(--bg)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <p className="serif" style={{ fontSize: 24, fontWeight: 600 }}>{Math.round(percentage)}%</p>
                        </div>
                    </div>
                    <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>Overall Score</p>
                    <p style={{ fontSize: 12, color: "var(--text-muted)" }}>{results.total} out of 70</p>
                </div>

                <h2 className="serif" style={{ fontSize: 16, marginBottom: 12 }}>By Domain</h2>
                {Object.entries(results.domains).map(([domain, data]) => {
                    const domainPercent = (data.total / (data.count * 5)) * 100;
                    return (
                        <div key={domain} style={{ marginBottom: 12 }}>
                            <p style={{ fontSize: 12, fontWeight: 600, marginBottom: 6 }}>{domain}</p>
                            <div style={{ height: 8, background: "var(--border)", borderRadius: 4, overflow: "hidden" }}>
                                <div style={{ height: "100%", background: "var(--accent)", width: `${domainPercent}%`, transition: "width 0.3s" }} />
                            </div>
                            <p style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4 }}>{data.total} / {data.count * 5}</p>
                        </div>
                    );
                })}

                <button onClick={() => navigate("home")} className="btn-primary" style={{ marginTop: 24 }}>Done</button>
            </div>
        );
    }

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <BackButton onClick={() => navigate("home")} />
            <h1 className="serif" style={{ fontSize: 22, marginBottom: 4 }}>Wellbeing Check-In</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 20 }}>Rate from 1 (struggling) to 5 (thriving).</p>

            <div style={{ marginBottom: 20 }}>
                {questions.map(q => (
                    <div key={q.id} style={{ marginBottom: 16 }}>
                        <p style={{ fontSize: 12, fontWeight: 600, marginBottom: 8 }}>{q.text}</p>
                        <div style={{ display: "flex", gap: 6 }}>
                            {[1, 2, 3, 4, 5].map(v => (
                                <button key={v} onClick={() => setAnswers({ ...answers, [q.id]: v })} style={{
                                    flex: 1, padding: 10, borderRadius: 8,
                                    background: answers[q.id] === v ? "var(--accent)" : "var(--card)",
                                    color: answers[q.id] === v ? "white" : "var(--text)",
                                    border: `1px solid ${answers[q.id] === v ? "var(--accent)" : "var(--border)"}`,
                                    fontWeight: 500, cursor: "pointer", fontSize: 12
                                }}>
                                    {v}
                                </button>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            <button onClick={submit} disabled={Object.keys(answers).length < 14} className="btn-primary" style={{
                opacity: Object.keys(answers).length < 14 ? 0.5 : 1,
                cursor: Object.keys(answers).length < 14 ? "default" : "pointer"
            }}>
                See Results
            </button>
        </div>
    );
}

function ChatScreen({ navigate }) {
    const [messages, setMessages] = useState(() => loadData("clarus_chat", []));
    const [input, setInput] = useState("");
    const [loading, setLoading] = useState(false);
    const scrollRef = useRef(null);

    useEffect(() => {
        scrollRef.current?.scrollIntoView();
    }, [messages]);

    const send = async () => {
        if (!input.trim()) return;
        const msg = input;
        setInput("");
        setMessages(p => [...p, { role: "user", content: msg }]);
        setLoading(true);

        try {
            const r = await fetch("https://clarus-api.eoghanhoman.workers.dev/web/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            if (r.ok) {
                const d = await r.json();
                setMessages(p => [...p, { role: "assistant", content: d.reply }]);
            }
        } catch (e) {
            console.error(e);
        } finally {
            setLoading(false);
        }
    };

    return (
        <div style={{ padding: "20px 22px 0", minHeight: "100%", display: "flex", flexDirection: "column" }}>
            <div style={{ flex: 1, overflowY: "auto", marginBottom: 16 }}>
                <h1 className="serif" style={{ fontSize: 22, marginBottom: 4 }}>Chat</h1>
                <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>I'm here to listen.</p>

                {messages.length === 0 ? (
                    <p style={{ fontSize: 13, color: "var(--text-muted)", textAlign: "center", padding: 20 }}>Start whenever you're ready.</p>
                ) : (
                    messages.map((m, i) => (
                        <div key={i} style={{
                            display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start",
                            marginBottom: 12
                        }}>
                            <div style={{
                                maxWidth: "85%", padding: 12, borderRadius: 12,
                                background: m.role === "user" ? "var(--accent)" : "var(--card)",
                                color: m.role === "user" ? "white" : "var(--text)",
                                fontSize: 13, lineHeight: 1.5
                            }}>
                                {m.content}
                            </div>
                        </div>
                    ))
                )}
                {loading && <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Typing...</div>}
                <div ref={scrollRef} />
            </div>

            <div style={{ paddingBottom: 20, borderTop: "1px solid var(--border)", paddingTop: 12 }}>
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                    <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Type here..." style={{
                        flex: 1, padding: "10px 12px", borderRadius: 10,
                        border: "1px solid var(--border)", background: "var(--card)",
                        fontFamily: "inherit", fontSize: 14
                    }} />
                    <button onClick={send} style={{
                        width: 40, height: 40, borderRadius: 10,
                        background: "var(--accent)", color: "white", border: "none", cursor: "pointer"
                    }}>→</button>
                </div>
                {messages.length > 0 && <button onClick={() => { setMessages([]); saveData("clarus_chat", []); }} style={{ fontSize: 12, color: "var(--text-muted)", background: "none", border: "none", cursor: "pointer" }}>Clear</button>}
            </div>
        </div>
    );
}

function SupportScreen({ navigate }) {
    const [need, setNeed] = useState(null);
    const [showAll, setShowAll] = useState(false);
    const [expanded, setExpanded] = useState(null);

    const needs = [

        { id: "general", label: "General support", emoji: "🤝", tint: "#D4942B" },

    const pros = [

        { name: "Accord", phone: "1800 393 393", hours: "Mon-Fri", url: "https://www.accord.ie", tint: "#8B7355", desc: "Couples counselling" },

        { name: "MABS", phone: "0761 07 2000", hours: "9am-8pm", url: "https://www.mabs.ie", tint: "#D4942B", desc: "Money advice" },
        { name: "Women's Aid", phone: "1800 341 900", hours: "24/7", url: "https://www.womensaid.ie", tint: "#C47850", desc: "Domestic abuse" },
    ];

        { name: "GAA Healthy Club", phone: null, url: "https://learning.gaa.ie/my-gaa/community-and-health/healthy-club/", tint: "#D4942B", desc: "Local GAA support" },
        { name: "parkrun", phone: null, url: "https://www.parkrun.com", tint: "#6B8E99", desc: "Weekly community" },
        { name: "Grow", phone: "1890 474 474", url: "https://www.grow.ie", tint: "#7A6B8E", desc: "Peer support" },
        { name: "Women's Sheds Ireland", phone: null, url: "https://www.womenssheds.ie", tint: "#6B8E99", desc: "Community spaces" },
    ];

    const ResourceCard = ({ r, isCom }) => {
        const isOpen = expanded === r.name;
        return (
            <div onClick={() => setExpanded(isOpen ? null : r.name)} style={{
                padding: "14px 16px", background: "var(--card)", borderRadius: 12,
                border: "1px solid var(--border)", marginBottom: 8, cursor: "pointer"
            }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                    <div style={{ flex: 1 }}>

                        <p style={{ fontSize: 11, color: r.tint, fontWeight: 500 }}>{r.phone || "Online"}</p>

                    {r.phone && <a href={`tel:${r.phone.replace(/\s/g, "")}`} onClick={e => e.stopPropagation()} style={{
                        width: 34, height: 34, borderRadius: 9, background: r.tint,
                        display: "flex", alignItems: "center", justifyContent: "center", color: "white",

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <h1 className="serif" style={{ fontSize: 22, color: "#C47850", marginBottom: 4 }}>Get Support</h1>

            <div style={{
                display: "flex", alignItems: "center", gap: 14, padding: 16, background: "var(--card)",

                <div style={{ flex: 1 }}>

                    <p style={{ fontSize: 12, color: "var(--text-muted)" }}>Call 999 or Samaritans 116 123 (24/7)</p>

                <div>
                    <h2 className="serif" style={{ fontSize: 18, marginBottom: 14 }}>What do you need?</h2>

                        }}>
                            <div style={{
                                width: 38, height: 38, borderRadius: 10, background: `${n.tint}15`,

                            <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{n.label}</span>
                            <span style={{ fontSize: 10, color: "var(--text-muted)" }}>›</span>

                    <div onClick={() => setShowAll(true)} style={{
                        textAlign: "center", padding: 14, fontSize: 13, fontWeight: 500,
                        color: "var(--text-muted)", cursor: "pointer", marginTop: 6
                    }}>
                        Show all
                    </div>
                </div>
            ) : (
                <div>
                    <div onClick={() => { setNeed(null); setShowAll(false); }} style={{
                        display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 500,
                        color: "#C47850", cursor: "pointer", marginBottom: 14
                    }}>
                        <span>‹</span> Back
                    </div>

                    {need && (
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                            <span style={{ fontSize: 16 }}>{needs.find(n => n.id === need)?.emoji}</span>
                            <h2 className="serif" style={{ fontSize: 18 }}>{needs.find(n => n.id === need)?.label}</h2>

                    <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: 0.8, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 10 }}>Services</p>
                    {pros.map(r => <ResourceCard key={r.name} r={r} isCom={false} />)}

                    {(need === "community" || showAll) && (
                        <>
                            <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: 0.8, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 10, marginTop: 16 }}>Community</p>
                            {community.map(r => <ResourceCard key={r.name} r={r} isCom={true} />)}

                    )}
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
