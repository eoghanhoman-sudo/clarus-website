<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F5EDD9">
    <title>Clarus</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" integrity="sha384-ku9eM40vVDsFUiERorrdlHlF0LIhdfn716M7TntM72Uo98T7LWiogD3hNenPx8Q0" crossorigin="anonymous"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #F5EDD9;
            --bg-deep: #EDE4CC;
            --card: #FFFEF7;
            --card-border: rgba(212, 148, 43, 0.12);
            --accent: #D4942B;
            --accent-soft: rgba(212, 148, 43, 0.08);
            --text: #3D332A;
            --text-muted: #8C7D6B;
            --text-dim: #AEA38F;
            --surface: #F0E7D0;
            --border: rgba(212, 148, 43, 0.10);
        }
        html, body, #root { height: 100%; width: 100%; overflow: hidden; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        input, textarea { font-family: 'DM Sans', -apple-system, sans-serif; }
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .screen::-webkit-scrollbar { display: none; }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 max(env(safe-area-inset-bottom, 8px), 8px);
            background: var(--card);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            background: none; border: none; padding: 4px 12px; cursor: pointer;
            color: var(--text-dim); font-size: 10px; font-weight: 500;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.15s;
        }
        .btn-primary:active { opacity: 0.85; }
        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 14px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .serif { font-family: 'DM Serif Display', serif; font-weight: 400; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.25); opacity: 0.9; } }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function loadData(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; }
}
function saveData(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
}

function App() {
    const [tab, setTab] = useState("home");
    const [subScreen, setSubScreen] = useState(null);
    const navigate = (t, sub = null) => { setTab(t); setSubScreen(sub); };

    const tabs = [
        { id: "home", label: "Home", icon: "🏠" },
        { id: "support", label: "Support", icon: "❤️" },
        { id: "mood", label: "Mood", icon: "😊" },
        { id: "toolkit", label: "Toolkit", icon: "🛠️" },
        { id: "chat", label: "Chat", icon: "💬" },
    ];

    return (
        <div className="app-container">
            <div className="screen">
                {tab === "home" && <HomeScreen navigate={navigate} />}
                {tab === "support" && <SupportScreen navigate={navigate} />}
                {tab === "mood" && <MoodScreen navigate={navigate} subScreen={subScreen} />}
                {tab === "toolkit" && <ToolkitScreen navigate={navigate} />}
                {tab === "chat" && <ChatScreen navigate={navigate} />}
                {tab === "signs" && <SignsScreen navigate={navigate} />}
                {tab === "breathing" && <BreathingScreen navigate={navigate} />}
                {tab === "grounding" && <GroundingScreen navigate={navigate} />}
                {tab === "articles" && <ArticlesScreen navigate={navigate} />}
                {tab === "assessment" && <AssessmentScreen navigate={navigate} />}
            </div>
            <div className="bottom-nav">
                {tabs.map(t => (
                    <button key={t.id} className={`nav-item ${tab === t.id ? "active" : ""}`} onClick={() => navigate(t.id)}>
                        <span style={{ fontSize: 20 }}>{t.icon}</span>
                        <span>{t.label}</span>
                    </button>
                ))}
            </div>
        </div>
    );
}

function BackButton({ onClick, color = "var(--accent)" }) {
    return (
        <button onClick={onClick} style={{
            background: "none", border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", gap: 6, fontSize: 13,
            fontWeight: 500, color, marginBottom: 14, padding: "4px 0"
        }}>
            <span>‹</span> Back
        </button>
    );
}

function HomeScreen({ navigate }) {
    const [greeting, setGreeting] = useState("");
    const facts = [
        "1 in 4 Irish adults will experience a mental health difficulty in their lifetime",
        "The average delay in seeking help in Ireland is 7 years",
        "450,000 Irish adults live with anxiety disorders",
        "Mental health conditions are treatable — recovery is possible",
        "Asking for help is a sign of strength, not weakness"
    ];

    useEffect(() => {
        const updateGreeting = () => {
            const hour = new Date().getHours();
            if (hour < 5) setGreeting("Good night");
            else if (hour < 12) setGreeting("Good morning");
            else if (hour < 17) setGreeting("Good afternoon");
            else setGreeting("Good evening");
        };
        updateGreeting();
    }, []);

    const getHero = () => {
        const hour = new Date().getHours();
        if (hour < 5 || hour >= 22) return { title: "Wind down", color: "#6B8E99", action: "breathing" };
        if (hour < 10) return { title: "Start your day", color: "#D4942B", action: "mood" };
        if (hour < 14) return { title: "Midday check-in", color: "#8B7355", action: "mood", sub: "journal" };
        if (hour < 17) return { title: "Afternoon pause", color: "#6B8E99", action: "breathing" };
        return { title: "Evening check-in", color: "#8B7355", action: "mood" };
    };

    const hero = getHero();
    const day = new Date().getDate();
    const fact = facts[day % facts.length];

    const gridItems = [
        { label: "Mood", emoji: "😊", a: "mood" },
        { label: "Journal", emoji: "📝", a: "mood", sub: "journal" },
        { label: "Breathe", emoji: "🫁", a: "breathing" },
        { label: "Toolkit", emoji: "🛠️", a: "toolkit" },
        { label: "Signs", emoji: "🔍", a: "signs" },
        { label: "Articles", emoji: "📚", a: "articles" },
        { label: "Grounding", emoji: "🌍", a: "grounding" },
        { label: "Check-in", emoji: "📋", a: "assessment" },
        { label: "Chat", emoji: "💬", a: "chat" },
    ];

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <h1 className="serif" style={{ fontSize: 28, marginBottom: 4 }}>{greeting}</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>You're in the right place.</p>

            <div onClick={() => navigate(hero.action, hero.sub)} style={{
                padding: 20, borderRadius: 16, background: `${hero.color}15`,
                border: `1px solid ${hero.color}30`, cursor: "pointer", marginBottom: 20
            }}>
                <p style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>{hero.title}</p>
                <p style={{ fontSize: 13, color: "var(--text-muted)" }}>Let's take a moment</p>
            </div>

            <div style={{ padding: 14, borderRadius: 14, background: "var(--card)", border: "1px solid var(--border)", marginBottom: 20 }}>
                <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: 0.8, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 8 }}>Did you know?</p>
                <p style={{ fontSize: 12.5, color: "var(--text)", lineHeight: 1.5 }}>{fact}</p>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 20 }}>
                {gridItems.map(f => (
                    <div key={f.label} onClick={() => navigate(f.a, f.sub)} className="card" style={{ textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: 14 }}>
                        <span style={{ fontSize: 24 }}>{f.emoji}</span>
                        <span style={{ fontSize: 13, fontWeight: 500 }}>{f.label}</span>
                    </div>
                ))}
            </div>

            <div style={{ padding: 12, background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)" }}>
                <p style={{ fontSize: 11, color: "var(--text-muted)", lineHeight: 1.4 }}>
                    Your data is stored securely on this device. Chat is processed securely. <a href="/privacy.html" target="_blank" style={{ color: "var(--accent)" }}>Learn more</a>.
                </p>
            </div>
        </div>
    );
}

function MoodScreen({ navigate, subScreen }) {
    const [mood, setMood] = useState(null);
    const [tags, setTags] = useState([]);
    const [entries, setEntries] = useState(() => loadData("clarus_mood", []));

    const moods = [
        { v: 1, e: "😢" },
        { v: 2, e: "😞" },
        { v: 3, e: "😐" },
        { v: 4, e: "🙂" },
        { v: 5, e: "😄" },
    ];

    const tagGroups = {
        positive: ["Grateful", "Energised", "Exercised", "Social time", "Creative", "Productive", "Outdoors", "Good sleep", "Family", "Relaxed"],
        difficult: ["Work stress", "Poor sleep", "Anxious", "Sad", "Lonely", "Low energy", "Overwhelmed", "Irritable"],
        situational: ["Money stress", "Screen overload", "Pain", "Hormonal", "Hopeful", "Angry"]
    };

    const save = () => {
        if (mood !== null) {
            const e = [...entries, { date: new Date().toISOString(), v: mood, tags }];
            setEntries(e);
            saveData("clarus_mood", e);
            setMood(null);
            setTags([]);
        }
    };

    if (subScreen === "journal") {
        return <JournalScreen navigate={navigate} />;
    }

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <BackButton onClick={() => navigate("home")} />
            <h1 className="serif" style={{ fontSize: 22, color: "#8B7355", marginBottom: 4 }}>How are you feeling?</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 20 }}>Check in with yourself.</p>

            <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                {moods.map(m => (
                    <div key={m.v} onClick={() => setMood(m.v)} style={{
                        flex: 1, textAlign: "center", padding: 12, borderRadius: 12,
                        background: mood === m.v ? "var(--card)" : "transparent",
                        border: `2px solid ${mood === m.v ? "#8B7355" : "var(--border)"}`,
                        cursor: "pointer"
                    }}>
                        <div style={{ fontSize: 24, marginBottom: 4 }}>{m.e}</div>
                    </div>
                ))}
            </div>

            {mood !== null && (
                <div style={{ animation: "slideUp 0.3s ease-out" }}>
                    <h2 className="serif" style={{ fontSize: 16, marginBottom: 12 }}>What contributed?</h2>
                    {Object.entries(tagGroups).map(([section, list]) => (
                        <div key={section} style={{ marginBottom: 16 }}>
                            <p style={{ fontSize: 10, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 8 }}>{section}</p>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                                {list.map(tag => (
                                    <button key={tag} onClick={() => setTags(t => t.includes(tag) ? t.filter(x => x !== tag) : [...t, tag])} style={{
                                        padding: "8px 12px", borderRadius: 20, fontSize: 12,
                                        background: tags.includes(tag) ? "#8B7355" : "var(--card)",
                                        color: tags.includes(tag) ? "white" : "var(--text)",
                                        border: tags.includes(tag) ? "none" : "1px solid var(--border)",
                                        cursor: "pointer"
                                    }}>
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ))}

                    <button onClick={save} className="btn-primary" style={{ marginTop: 20, marginBottom: 12 }}>Save mood</button>
                    <button onClick={() => navigate("mood", "journal")} className="btn-secondary" style={{ marginBottom: 12 }}>Write in journal</button>
                </div>
            )}

            {entries.length > 0 && (
                <div style={{ marginTop: 20 }}>
                    <h2 className="serif" style={{ fontSize: 16, marginBottom: 12 }}>Recent</h2>
                    {entries.slice(-3).reverse().map((e, i) => (
                        <div key={i} style={{ display: "flex", gap: 10, padding: 12, background: "var(--card)", borderRadius: 12, marginBottom: 8 }}>
                            <span style={{ fontSize: 20 }}>{moods.find(m => m.v === e.v)?.e}</span>
                            <div style={{ flex: 1, fontSize: 12, fontWeight: 500 }}>
                                {new Date(e.date).toLocaleDateString()}
                                {e.tags.length > 0 && <div style={{ fontSize: 11, color: "var(--text-muted)" }}>{e.tags.join(", ")}</div>}
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

function JournalScreen({ navigate }) {
    const [view, setView] = useState("home");
    const [emotion, setEmotion] = useState(null);
    const [text, setText] = useState("");
    const [entries, setEntries] = useState(() => loadData("clarus_journal", []));
    const [showMore, setShowMore] = useState(false);

    const emotions = [
        { id: 1, l: "Anxiety", e: "😰", cat: "c" },
        { id: 2, l: "Stress", e: "😓", cat: "c" },
        { id: 3, l: "Sadness", e: "😢", cat: "c" },
        { id: 4, l: "Overwhelm", e: "🌊", cat: "c" },
        { id: 5, l: "Anger", e: "😠", cat: "c" },
        { id: 6, l: "Tired", e: "😴", cat: "c" },
        { id: 7, l: "Gratitude", e: "🙏", cat: "c" },
        { id: 8, l: "Hope", e: "✨", cat: "c" },
        { id: 9, l: "Just Write", e: "📝", cat: "c" },
        { id: 10, l: "Guilt", e: "😔", cat: "m" },
        { id: 11, l: "Loneliness", e: "🌙", cat: "m" },
        { id: 12, l: "Excitement", e: "🎉", cat: "m" },
        { id: 13, l: "Shame", e: "😳", cat: "m" },
        { id: 14, l: "Relationship", e: "💑", cat: "m" },
        { id: 15, l: "Nostalgic", e: "🕰️", cat: "m" },
        { id: 16, l: "Regret", e: "🤔", cat: "m" },
        { id: 17, l: "Money", e: "💸", cat: "m" },
        { id: 18, l: "Parent", e: "👶", cat: "m" },
        { id: 19, l: "Rage", e: "🔥", cat: "m" },
        { id: 20, l: "Proud", e: "🦁", cat: "m" },
        { id: 21, l: "Content", e: "😌", cat: "m" },
    ];

    const save = () => {
        if (emotion && text.trim()) {
            const e = [...entries, { date: new Date().toISOString(), emotion: emotion.l, text }];
            setEntries(e);
            saveData("clarus_journal", e);
            setEmotion(null);
            setText("");
            setView("home");
        }
    };

    if (view === "write") {
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column" }}>
                <BackButton onClick={() => setView("emotion")} />
                <h1 className="serif" style={{ fontSize: 22, color: "#8B7355", marginBottom: 4 }}>{emotion?.l}</h1>
                <textarea value={text} onChange={e => setText(e.target.value)} placeholder="Write here..." style={{
                    flex: 1, padding: 14, borderRadius: 12, border: "1px solid var(--border)",
                    background: "var(--card)", fontFamily: "inherit", fontSize: 14, resize: "none"
                }} />
                <button onClick={save} className="btn-primary" style={{ marginTop: 12 }}>Save entry</button>
            </div>
        );
    }

    if (view === "emotion") {
        const common = emotions.filter(e => e.cat === "c");
        const more = emotions.filter(e => e.cat === "m");

        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
                <BackButton onClick={() => setView("home")} />
                <h1 className="serif" style={{ fontSize: 22, color: "#8B7355", marginBottom: 4 }}>What are you feeling?</h1>

                <div style={{ marginBottom: 20 }}>
                    <p style={{ fontSize: 11, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 10 }}>Common</p>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 12 }}>
                        {common.map(e => (
                            <div key={e.id} onClick={() => { setEmotion(e); setView("write"); }} style={{
                                padding: 12, borderRadius: 12, background: "var(--card)",
                                border: "1px solid var(--border)", textAlign: "center", cursor: "pointer"
                            }}>
                                <div style={{ fontSize: 24, marginBottom: 6 }}>{e.e}</div>
                                <div style={{ fontSize: 11, fontWeight: 500 }}>{e.l}</div>
                            </div>
                        ))}
                    </div>
                    {!showMore && <button onClick={() => setShowMore(true)} style={{
                        width: "100%", padding: 10, background: "transparent",
                        border: "1px dashed var(--border)", borderRadius: 10, cursor: "pointer",
                        fontSize: 12, fontWeight: 500, color: "var(--text-muted)"
                    }}>More feelings →</button>}
                </div>

                {showMore && (
                    <div>
                        <p style={{ fontSize: 11, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 10 }}>All feelings</p>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                            {more.map(e => (
                                <div key={e.id} onClick={() => { setEmotion(e); setView("write"); }} style={{
                                    padding: 12, borderRadius: 12, background: "var(--card)",
                                    border: "1px solid var(--border)", textAlign: "center", cursor: "pointer"
                                }}>
                                    <div style={{ fontSize: 24, marginBottom: 6 }}>{e.e}</div>
                                    <div style={{ fontSize: 11, fontWeight: 500 }}>{e.l}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    }

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <BackButton onClick={() => navigate("mood")} />
            <h1 className="serif" style={{ fontSize: 22, color: "#8B7355", marginBottom: 4 }}>Journaling</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>Reflect on your day.</p>

            <div onClick={() => { setEmotion({ id: 9, l: "Three Words" }); setView("write"); }} className="card" style={{ marginBottom: 16, cursor: "pointer" }}>
                <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>📝 Just three words</p>
                <p style={{ fontSize: 12, color: "var(--text-muted)" }}>Describe your day in three words</p>
            </div>

            <button onClick={() => setView("emotion")} className="btn-primary" style={{ marginBottom: 20 }}>Start writing</button>

            {entries.length > 0 && (
                <div>
                    <h2 className="serif" style={{ fontSize: 16, marginBottom: 12 }}>Recent entries</h2>
                    {entries.slice(-5).reverse().map((e, i) => (
                        <div key={i} style={{ padding: 14, background: "var(--card)", borderRadius: 12, marginBottom: 8 }}>
                            <p style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>{e.emotion}</p>
                            <p style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 6 }}>{new Date(e.date).toLocaleDateString()}</p>
                            <p style={{ fontSize: 12, lineHeight: 1.4 }}>{e.text.substring(0, 80)}...</p>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

function BreathingScreen({ navigate }) {
    const [exercising, setExercising] = useState(null);
    const [phase, setPhase] = useState("");
    const [phaseTime, setPhaseTime] = useState(0);
    const [cycle, setCycle] = useState(0);
    const timerRef = useRef(null);

    const patterns = [
        { id: "calm", name: "Calm", sub: "Slow & soothing", inhale: 6, hold: 0, exhale: 9, hold2: 3, time: "3 min", color: "#6B8E99" },
        { id: "box", name: "Box", sub: "Balanced rhythm", inhale: 7, hold: 7, exhale: 7, hold2: 7, time: "3 min", color: "#7A6B8E" },
        { id: "478", name: "4-7-8", sub: "Grounding", inhale: 5, hold: 8, exhale: 10, hold2: 3, time: "3 min", color: "#8B7355" },
        { id: "reset", name: "Reset", sub: "Quick relief", inhale: 5, hold: 3, exhale: 8, hold2: 3, time: "2 min", color: "#D4942B" },
    ];

    const startExercise = (p) => {
        setExercising(p);
        setCycle(0);
        setPhase("ready");
    };

    const startBreath = () => {
        if (!exercising) return;
        setCycle(0);
        runPhase("inhale");
    };

    const runPhase = (phaseName) => {
        if (!exercising) return;
        setPhase(phaseName);
        let duration = 0;
        if (phaseName === "inhale") duration = exercising.inhale * 1000;
        else if (phaseName === "hold") duration = exercising.hold * 1000;
        else if (phaseName === "exhale") duration = exercising.exhale * 1000;
        else if (phaseName === "hold2") duration = exercising.hold2 * 1000;

        let elapsed = 0;
        const tick = () => {
            elapsed += 50;
            setPhaseTime(Math.min(elapsed, duration));
            if (elapsed < duration) {
                timerRef.current = setTimeout(tick, 50);
            } else {
                nextPhase(phaseName);
            }
        };
        timerRef.current = setTimeout(tick, 50);
    };

    const nextPhase = (currentPhase) => {
        if (currentPhase === "inhale") runPhase("hold");
        else if (currentPhase === "hold") runPhase("exhale");
        else if (currentPhase === "exhale") runPhase("hold2");
        else if (currentPhase === "hold2") {
            setCycle(c => c + 1);
            if (cycle < 3) runPhase("inhale");
            else finish();
        }
    };

    const finish = () => {
        setExercising(null);
        setPhase("");
    };

    const stop = () => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setExercising(null);
        setPhase("");
    };

    useEffect(() => {
        return () => {
            if (timerRef.current) clearTimeout(timerRef.current);
        };
    }, []);

    if (exercising && phase === "ready") {
        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                <h1 className="serif" style={{ fontSize: 24, marginBottom: 8 }}>{exercising.name}</h1>
                <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 40 }}>{exercising.sub}</p>
                <button onClick={startBreath} className="btn-primary" style={{ width: 200 }}>Start</button>
                <button onClick={() => setExercising(null)} className="btn-secondary" style={{ width: 200, marginTop: 12 }}>Back</button>
            </div>
        );
    }

    if (exercising && phase) {
        const phases = { inhale: "Breathe in", hold: "Hold", exhale: "Let it go", hold2: "Rest" };
        const orb = { inhale: 0.75, hold: 1.0, exhale: 0.5, hold2: 0.6 };
        const progress = {
            inhale: phaseTime / (exercising.inhale * 1000),
            hold: phaseTime / (exercising.hold * 1000),
            exhale: phaseTime / (exercising.exhale * 1000),
            hold2: phaseTime / (exercising.hold2 * 1000),
        }[phase] || 0;
        const scale = 0.55 + (orb[phase] - 0.55) * (1 - Math.pow(1 - progress, 3));

        return (
            <div style={{ padding: "20px 22px 40px", minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                <p style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 40 }}>Cycle {cycle + 1}/4</p>
                <div style={{ width: 200, height: 200, marginBottom: 40, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <div style={{
                        width: 200 * scale, height: 200 * scale, borderRadius: "50%",
                        background: `${exercising.color}40`, transition: "all 0.05s linear"
                    }} />
                </div>
                <p className="serif" style={{ fontSize: 16, marginBottom: 8 }}>{phases[phase]}</p>
                <button onClick={stop} className="btn-secondary">Stop</button>
            </div>
        );
    }

    return (
        <div style={{ padding: "20px 22px 40px", minHeight: "100%" }}>
            <BackButton onClick={() => navigate("home")} />
            <h1 className="serif" style={{ fontSize: 22, color: "#6B8E99", marginBottom: 4 }}>Breathing</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 20 }}>Calm your nervous system.</p>

            {patterns.map(p => (
                <div key={p.id} onClick={() => startExercise(p)} className="card" style={{ marginBottom: 10, cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <div>
                            <p style={{ fontSize: 14, fontWeight: 600 }}>{p.name}</p>
                            <p style={{ fontSize: 12, color: "var(--text-muted)" }}>{p.sub}</p>
                        </div>
                        <p style={{ fontSize: 12, fontWeight: 500, color: p.color }}>{p.time}</p>
                    </div>
                </div>
            ))}
        </div>
    );
}

            { id: "s25", icon: "😶", title: "Difficulty trusting", desc: "Keeping people at distance, expecting to be let down.", selfCheck: "Do you find it hard to trust people or feel safe in close relationships?", helps: "Start with one person. Trust is rebuilt in small steps. A therapist can provide a safe space to practice." }
        ]
    };

    const othersSigns = {
        burnout: [
            { id: "o1", icon: "🔄", title: "Personality shift", desc: "They seem different — quieter, more irritable, less engaged. Trust your instinct.", helps: "'You seem different lately' is enough. You don't need to name what's wrong." },
            { id: "o2", icon: "📵", title: "Withdrawal & cancelling", desc: "Pulling back from plans, taking longer to reply, saying 'I'm fine'.", helps: "Keep inviting gently: 'No worries if you can't — just want you to know you're welcome.'" },
            { id: "o3", icon: "🎭", title: "Performing normality", desc: "Putting on a brave face, forced laughter, deflecting real questions.", helps: "'You don't have to be okay around me.' Sometimes that's the most powerful thing to say." },
            { id: "o4", icon: "💤", title: "Visible exhaustion", desc: "Dark circles, low energy, stopped taking care of themselves.", helps: "Offer something practical: 'Can I bring you food?' Meet them with action, not observation." },
            { id: "o8", icon: "📋", title: "Work overwhelm", desc: "Talking about drowning — or worse, gone silent about work entirely.", helps: "'How are things at work, honestly?' If they deflect, note the silence." }
        ],
        anxiety: [
            { id: "o6", icon: "⚡", title: "Unusually anxious", desc: "Jumpy, restless, hyper-alert. Worrying more than usual about everything.", helps: "Don't say 'just relax.' Try: 'That sounds stressful. What would help right now?'" }
        ],
        depression: [
            { id: "o5", icon: "😔", title: "Loss of interest", desc: "Things they loved don't seem to matter anymore. The colour's drained.", helps: "Re-introduce shared activities in low-pressure ways. Don't ask them to perform enthusiasm." },
            { id: "o7", icon: "💬", title: "Burden talk", desc: "Saying 'what's the point' or 'everyone would be better off without me' — even joking.", helps: "Don't dismiss it. 'It sounds like you're going through something hard. I want to hear about it.'" }
        ]
    };

    const categoryNames = {
        burnout: { name: "Burnout", emoji: "🔥", color: "#D4942B" },
        anxiety: { name: "Anxiety", emoji: "⚡", color: "#6B8E99" },
        depression: { name: "Depression", emoji: "🌧️", color: "#8B7355" },
        substance: { name: "Substance Use", emoji: "🪞", color: "#7A6B8E" },
        trauma: { name: "Trauma", emoji: "🔒", color: "#C47850" }
    };

    const allSelfSigns = Object.entries(selfSigns).flatMap(([cat, signs]) => signs.map(s => ({ ...s, cat })));

    const coachSteps = [
        { title: "Before You Start", content: "You don't need to fix anything or have answers. You just need to show you've noticed and that you care. Most people say afterward: 'I wish someone had asked sooner.' An imperfect attempt at connection is infinitely better than comfortable silence.",
          doList: ["Choose a private, low-pressure moment", "Accept they might deflect the first time", "Check your own emotional state first"],
          dontList: ["Ambush them when busy or stressed", "Have this conversation over text", "Make it about you: 'I've been so worried'"] },
        { title: "Opening the Door", content: "The first words set the tone. You're opening a door, not pushing them through it.",
          scripts: [
            { label: "Gentle check-in", text: "\"I've noticed you seem a bit different lately, and I wanted to check in. No pressure to talk — but I'm here if you want to.\"" },
            { label: "Normalising", text: "\"I went through something similar last year and it really helped to talk to someone. You don't have to be in crisis to ask for help.\"" },
            { label: "Naming what you see", text: "\"I noticed you've cancelled the last few things and you seem really tired. That's not a judgement — I just care about you.\"" }
          ],
          doList: ["Use 'I' statements: 'I've noticed...', 'I wanted to check in...'", "Leave space for silence", "Make it clear they don't have to respond now"],
          dontList: ["Start with 'We need to talk'", "List everything you've noticed at once", "Say 'You seem depressed' — labels shut people down"] },
        { title: "If They Open Up", content: "Your job is to listen — really listen. Not to fix, not to relate, not to minimise. Just receive what they're telling you.",
          scripts: [
            { label: "Validating", text: "\"That sounds really hard. I'm glad you told me.\"" },
            { label: "Asking what they need", text: "\"What would help right now? I'm happy to just listen, or we can figure something out together.\"" }
          ],
          doList: ["Listen more than you speak — aim for 80/20", "Validate: 'That makes complete sense'", "Tolerate silence — that's where processing happens"],
          dontList: ["'I know how you feel'", "Jump to solutions: 'Have you tried...'", "Minimise: 'Everyone feels like that' or 'It could be worse'"] },
        { title: "If They Deflect", content: "Most people deflect the first time — 'I'm fine', 'Just tired.' This doesn't mean it failed. You've planted a seed. Many people come back days or weeks later.",
          scripts: [
            { label: "Leaving the door open", text: "\"Okay — no pressure at all. Just know that if anything changes, I'm here. You don't have to handle things alone.\"" },
            { label: "Gentle persistence", text: "\"I hear you. I'm asking because I care, not because I'm judging. If the answer changes, you can always come back to me.\"" }
          ],
          doList: ["Respect their response", "Keep showing up — continue inviting them", "Check in again in a few days"],
          dontList: ["Push harder: 'Come on, I can tell something's wrong'", "Withdraw because they didn't open up", "Talk to others without their consent"] },
        { title: "Suggesting Next Steps", content: "If they've acknowledged something is wrong, gently suggesting support can be transformative — as an offer, not an instruction.",
          scripts: [
            { label: "Offering to help", text: "\"Would it help if I looked into some options with you? Even just a GP appointment — I can sit with you while you do it.\"" },
            { label: "Sharing a resource", text: "\"I came across this app called Clarus — it has a self check-in and some practical tools. No pressure, but thought of you.\"" }
          ],
          doList: ["Offer to do things together: 'I'll sit with you while you call'", "Suggest small steps, not big commitments", "Frame help as normal: 'Like going to the doctor for a sore knee'"],
          dontList: ["Issue ultimatums", "Make them feel broken: 'You really need help'", "Overwhelm with options — pick one suggestion"] }
    ];

    // CHECK-IN VIEW
    if (view === "checkin") {
        if (checkInIndex >= allSelfSigns.length) {
            const results = {};
            Object.keys(categoryNames).forEach(cat => {
                const catSigns = allSelfSigns.filter(s => s.cat === cat);
                const yes = catSigns.filter(s => checkInAnswers[s.id] === "yes").length;
                const sometimes = catSigns.filter(s => checkInAnswers[s.id] === "sometimes").length;

            const totalResonating = Object.values(results).reduce((a, b) => a + b.resonating, 0);

                    {resonatingSigns.length > 0 && (
