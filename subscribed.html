<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check your email — Clarus</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #F5EDD9;
            --card: #FFFEF7;
            --card-border: rgba(212, 148, 43, 0.12);
            --accent: #D4942B;
            --text: #3D332A;
            --text-muted: #8C7D6B;
            --text-dim: #AEA38F;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            max-width: 1080px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: var(--text);
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 32px rgba(61, 51, 42, 0.06);
        }

        .icon {
            width: 64px;
            height: 64px;
            background: rgba(212, 148, 43, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--accent);
        }

        .label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.88; }

        .note {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 20px;
            margin-bottom: 0;
        }

        @media (max-width: 520px) {
            .card { padding: 40px 28px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Clarus<span>.</span></a>
    </nav>

    <main>
        <div class="card">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>
            <p class="label">Almost there</p>
            <h1>Check your inbox</h1>
            <p>We've sent a confirmation email your way. Click the link inside to secure your spot — it only takes a second.</p>
            <a href="/" class="btn">Back to Clarus</a>
            <p class="note">Can't find it? Check your spam folder. We sent it from info@clarusapp.ie</p>
        </div>
    </main>
</body>
</html>
