<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarus — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1a;
      color: #e8e0d0;
      min-height: 100vh;
    }

    .header {
      background: #222;
      border-bottom: 1px solid #333;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: #C4903E;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .refresh-btn {
      background: #333;
      border: 1px solid #444;
      color: #e8e0d0;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }

    .refresh-btn:hover { background: #444; }

    .last-updated {
      font-size: 12px;
      color: #888;
    }

    .auto-refresh {
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .auto-refresh input { accent-color: #C4903E; }

    /* Login screen */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 32px;
    }

    .login-screen h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: #C4903E;
      margin-bottom: 8px;
    }

    .login-screen p {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .login-input {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e8e0d0;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      width: 320px;
      margin-bottom: 12px;
    }

    .login-input:focus { outline: none; border-color: #C4903E; }

    .login-btn {
      background: #C4903E;
      color: #1a1a1a;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .login-btn:hover { background: #d4a04e; }

    .login-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #888;
    }

    .login-remember input { accent-color: #C4903E; }

    /* Dashboard grid */
    .dashboard {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #222;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: #888;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.green { background: #4ade80; }
    .status-dot.yellow { background: #facc15; }
    .status-dot.red { background: #f87171; }
    .status-dot.grey { background: #666; }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .metric:last-child { border-bottom: none; }

    .metric-label {
      font-size: 14px;
      color: #aaa;
    }

    .metric-value {
      font-size: 14px;
      font-weight: 600;
      color: #e8e0d0;
    }

    .metric-value.highlight {
      color: #C4903E;
      font-size: 24px;
    }

    .big-number {
      font-size: 36px;
      font-weight: 700;
      color: #C4903E;
      line-height: 1;
    }

    .big-label {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .stat-row {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }

    .stat-box {
      flex: 1;
    }

    /* Subscriber list */
    .subscriber {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 13px;
    }

    .subscriber:last-child { border-bottom: none; }

    .subscriber-email { color: #e8e0d0; }

    .subscriber-date { color: #666; font-size: 12px; }

    .subscriber-tag {
      background: #C4903E22;
      color: #C4903E;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Quick links */
    .quick-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .quick-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 10px;
      text-decoration: none;
      color: #e8e0d0;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .quick-link:hover { background: #333; }

    .quick-link-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    /* Loading / Error */
    .loading {
      color: #666;
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }

    .error-msg {
      background: #f8717122;
      border: 1px solid #f87171;
      color: #f87171;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .nameserver-item {
      font-size: 13px;
      color: #aaa;
      padding: 4px 0;
      font-family: monospace;
    }

    .card.wide {
      grid-column: 1 / -1;
    }

    @media (max-width: 768px) {
      .dashboard { padding: 16px; grid-template-columns: 1fr; }
      .header { padding: 16px; }
      .quick-links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="loginScreen" class="login-screen">
  <h2>Clarus Dashboard</h2>
  <p>Enter your dashboard key to continue</p>
  <input type="password" id="keyInput" class="login-input" placeholder="Dashboard key" autocomplete="off">
  <div class="login-remember">
    <input type="checkbox" id="rememberKey" checked>
    <label for="rememberKey">Remember on this device</label>
  </div>
  <button onclick="login()" class="login-btn">Open Dashboard</button>
  <div id="loginError" style="color: #f87171; font-size: 13px; margin-top: 12px;"></div>
</div>

<!-- Dashboard -->
<div id="dashboardScreen" style="display: none;">
  <div class="header">
    <h1>Clarus Dashboard</h1>
    <div class="header-right">
      <div class="auto-refresh">
        <input type="checkbox" id="autoRefresh" checked>
        <label for="autoRefresh">Auto-refresh (60s)</label>
      </div>
      <span class="last-updated" id="lastUpdated"></span>
      <button class="refresh-btn" onclick="fetchData()">Refresh</button>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="loading">Loading dashboard data...</div>
  </div>
</div>

<script>
const API_BASE = "https://clarus-api.eoghanhoman.workers.dev";
let dashboardKey = "";
let refreshInterval = null;

// Check for saved key
const savedKey = localStorage.getItem("clarus_dashboard_key");
if (savedKey) {
  dashboardKey = savedKey;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboardScreen").style.display = "block";
  fetchData();
  startAutoRefresh();
}

function login() {
  const key = document.getElementById("keyInput").value.trim();
  if (!key) {
    document.getElementById("loginError").textContent = "Please enter a key";
    return;
  }
  dashboardKey = key;

  if (document.getElementById("rememberKey").checked) {
    localStorage.setItem("clarus_dashboard_key", key);
  }

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboardScreen").style.display = "block";
  fetchData();
  startAutoRefresh();
}

document.getElementById("keyInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    if (document.getElementById("autoRefresh").checked) fetchData();
  }, 60000);
}

async function fetchData() {
  try {
    const resp = await fetch(`${API_BASE}/dashboard`, {
      headers: { Authorization: `Bearer ${dashboardKey}` },
    });

    if (resp.status === 401) {
      localStorage.removeItem("clarus_dashboard_key");
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("dashboardScreen").style.display = "none";
      document.getElementById("loginError").textContent = "Invalid key. Please try again.";
      return;
    }

    const data = await resp.json();
    renderDashboard(data);
    document.getElementById("lastUpdated").textContent =
      `Updated: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    document.getElementById("dashboard").innerHTML =
      `<div class="error-msg">Failed to connect to API: ${err.message}</div>`;
  }
}

function renderDashboard(data) {
  const d = document.getElementById("dashboard");
  const s = data.services || {};
  const a = data.activity || {};

  d.innerHTML = `
    <!-- Activity Overview -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Activity (Last 24h)</span>
        <span class="status-dot ${data.worker?.status === 'online' ? 'green' : 'red'}"></span>
      </div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="big-number">${a.uniqueUsers ?? '—'}</div>
          <div class="big-label">Unique users</div>
        </div>
        <div class="stat-box">
          <div class="big-number">${a.chatRequests ?? '—'}</div>
          <div class="big-label">Chat messages</div>
        </div>
      </div>
      <div class="metric">
        <span class="metric-label">Newsletter signups (period)</span>
        <span class="metric-value">${a.newsletterRequests ?? '—'}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Mood insights requested</span>
        <span class="metric-value">${a.moodRequests ?? '—'}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Active rate limit keys</span>
        <span class="metric-value">${a.activeRateLimitKeys ?? '—'}</span>
      </div>
    </div>

    <!-- Cloudflare Worker -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Cloudflare Worker</span>
        <span class="status-dot ${data.worker?.status === 'online' ? 'green' : 'red'}"></span>
      </div>
      <div class="metric">
        <span class="metric-label">Status</span>
        <span class="metric-value" style="color: ${data.worker?.status === 'online' ? '#4ade80' : '#f87171'}">${data.worker?.status || 'unknown'}</span>
      </div>
      <div class="metric">
        <span class="metric-label">AI Model</span>
        <span class="metric-value">${data.worker?.model || '—'}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Anthropic API Key</span>
        <span class="metric-value" style="color: ${s.anthropic?.keyConfigured ? '#4ade80' : '#f87171'}">${s.anthropic?.keyConfigured ? 'Configured' : 'Missing'}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Chat rate limit</span>
        <span class="metric-value">${data.rateLimits?.chat || '—'} / day</span>
      </div>
      <div class="metric">
        <span class="metric-label">Newsletter rate limit</span>
        <span class="metric-value">${data.rateLimits?.newsletter || '—'} / hour</span>
      </div>
    </div>

    <!-- Newsletter / Buttondown -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Newsletter (Buttondown)</span>
        <span class="status-dot ${s.buttondown?.status === 'connected' ? 'green' : s.buttondown?.status === 'not_configured' ? 'grey' : 'red'}"></span>
      </div>
      ${s.buttondown?.status === 'connected' ? `
        <div class="stat-row">
          <div class="stat-box">
            <div class="big-number">${s.buttondown.totalSubscribers}</div>
            <div class="big-label">Confirmed subscribers</div>
          </div>
          <div class="stat-box">
            <div class="big-number">${s.buttondown.unconfirmedCount ?? '—'}</div>
            <div class="big-label">Awaiting confirmation</div>
          </div>
        </div>
        ${s.buttondown.recentSubscribers?.length > 0 ? `
          <div style="margin-top: 12px;">
            <div style="font-size: 12px; color: #666; margin-bottom: 8px;">Recent subscribers</div>
            ${s.buttondown.recentSubscribers.map(sub => `
              <div class="subscriber">
                <span class="subscriber-email">${sub.email}</span>
                <span class="subscriber-date">${sub.date ? new Date(sub.date).toLocaleDateString() : ''}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      ` : `
        <div class="metric">
          <span class="metric-label">Status</span>
          <span class="metric-value" style="color: #f87171">${s.buttondown?.status || 'unknown'}</span>
        </div>
      `}
    </div>

    <!-- DNS & Domain -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Domain & DNS</span>
        <span class="status-dot ${s.dns?.cloudflareActive ? 'green' : 'yellow'}"></span>
      </div>
      <div class="metric">
        <span class="metric-label">Cloudflare active</span>
        <span class="metric-value" style="color: ${s.dns?.cloudflareActive ? '#4ade80' : '#facc15'}">${s.dns?.cloudflareActive ? 'Yes' : 'Not yet'}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Website</span>
        <span class="metric-value" style="color: ${s.website?.status === 'online' ? '#4ade80' : '#f87171'}">${s.website?.status || 'unknown'} ${s.website?.statusCode ? `(${s.website.statusCode})` : ''}</span>
      </div>
      ${s.dns?.nameservers?.length > 0 ? `
        <div style="margin-top: 12px;">
          <div style="font-size: 12px; color: #666; margin-bottom: 6px;">Nameservers</div>
          ${s.dns.nameservers.map(ns => `<div class="nameserver-item">${ns}</div>`).join('')}
        </div>
      ` : ''}
    </div>

    <!-- Quick Links -->
    <div class="card wide">
      <div class="card-header">
        <span class="card-title">Quick Links</span>
      </div>
      <div class="quick-links">
        <a href="https://dash.cloudflare.com" target="_blank" class="quick-link">
          <span class="quick-link-icon">☁️</span>
          Cloudflare Dashboard
        </a>
        <a href="https://appstoreconnect.apple.com" target="_blank" class="quick-link">
          <span class="quick-link-icon">📱</span>
          App Store Connect / TestFlight
        </a>
        <a href="https://buttondown.email" target="_blank" class="quick-link">
          <span class="quick-link-icon">📧</span>
          Buttondown Newsletter
        </a>
        <a href="https://console.anthropic.com" target="_blank" class="quick-link">
          <span class="quick-link-icon">🤖</span>
          Anthropic Console (API usage)
        </a>
        <a href="https://cp.blacknight.com" target="_blank" class="quick-link">
          <span class="quick-link-icon">🌐</span>
          Blacknight (Domain)
        </a>
        <a href="https://github.com/eoghanhoman-sudo/clarus-website" target="_blank" class="quick-link">
          <span class="quick-link-icon">📂</span>
          GitHub (Website repo)
        </a>
        <a href="https://clarusapp.ie" target="_blank" class="quick-link">
          <span class="quick-link-icon">🔗</span>
          Live Website
        </a>
        <a href="https://clarusapp.ie/app.html" target="_blank" class="quick-link">
          <span class="quick-link-icon">📲</span>
          Web App (Android testers)
        </a>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
